<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="height:180px">
  <div class="lbl" style="margin-bottom:16px">BUTTONS · PRIMARY · GHOST · MINIMAL</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
    <button style="display:inline-flex;align-items:center;gap:10px;padding:13px 22px;font-family:var(--font-sans);font-size:15px;font-weight:600;background:#d9a441;color:#07121d;border:0;border-radius:8px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.18);cursor:pointer">
      Get connected
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </button>
    <button style="display:inline-flex;align-items:center;gap:10px;padding:13px 22px;font-family:var(--font-sans);font-size:15px;font-weight:600;background:transparent;color:var(--fg);border:1px solid var(--rule-strong);border-radius:8px;cursor:pointer">
      Volunteer sign up
    </button>
    <button style="display:inline-flex;align-items:center;gap:10px;padding:13px 0;font-family:var(--font-sans);font-size:15px;font-weight:600;background:transparent;color:var(--fg);border:0;cursor:pointer">
      Investment Group
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
    </button>
  </div>
  <div style="margin-top:18px;display:flex;gap:12px;flex-wrap:wrap;align-items:center">
    <span style="font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-dim)">ON PAPER →</span>
    <button style="padding:13px 22px;font-family:var(--font-sans);font-size:15px;font-weight:600;background:var(--ink);color:var(--paper-cream);border:0;border-radius:8px;cursor:pointer">Donate $50</button>
    <button style="padding:13px 22px;font-family:var(--font-sans);font-size:15px;font-weight:600;background:transparent;color:var(--ink);border:1px solid rgba(7,18,29,0.32);border-radius:8px;cursor:pointer">Read the brief</button>
  </div>
</body></html>
