<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="paper" style="height:180px">
  <div class="lbl ink" style="margin-bottom:12px">LIGHT SURFACES · PAPER</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
    <div style="background:#fffaf0;border-radius:8px;padding:18px;border:1px solid rgba(7,18,29,0.16)">
      <div class="lbl ink">PAPER CREAM</div>
      <div style="font-family:var(--font-display);font-size:18px;margin-top:8px;color:var(--ink-fg)">Trust band</div>
      <div style="font-size:12px;color:var(--ink-fg-muted);margin-top:4px">Lightest paper</div>
    </div>
    <div style="background:#f5ecd9;border-radius:8px;padding:18px;border:1px solid rgba(7,18,29,0.16)">
      <div class="lbl ink">WARM CREAM</div>
      <div style="font-family:var(--font-display);font-size:18px;margin-top:8px;color:var(--ink-fg)">Story insert</div>
      <div style="font-size:12px;color:var(--ink-fg-muted);margin-top:4px">Warm narrative</div>
    </div>
    <div style="background:#fff;border-radius:8px;padding:18px;border:1px solid rgba(7,18,29,0.16)">
      <div class="lbl ink">WHITE</div>
      <div style="font-family:var(--font-display);font-size:18px;margin-top:8px;color:var(--ink-fg)">Card</div>
      <div style="font-size:12px;color:var(--ink-fg-muted);margin-top:4px">Card surface</div>
    </div>
  </div>
</body></html>
