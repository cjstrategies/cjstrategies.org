<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="height:280px">
  <div class="lbl" style="margin-bottom:14px">SEAL ON DARK · BACK WITH CREAM DISC</div>
  <div style="display:flex;align-items:center;gap:24px">
    <!-- big -->
    <div style="width:200px;height:200px;border-radius:50%;background:var(--paper-cream);display:grid;place-items:center;box-shadow:0 24px 60px -24px rgba(7,18,29,0.6),inset 0 0 0 1px rgba(7,18,29,0.08)">
      <img src="../assets/logo-color.png" width="180" height="180" alt="" style="object-fit:contain">
    </div>
    <!-- medium -->
    <div style="width:96px;height:96px;border-radius:50%;background:var(--paper-cream);display:grid;place-items:center;box-shadow:0 12px 32px -10px rgba(7,18,29,0.55),inset 0 0 0 1px rgba(7,18,29,0.08)">
      <img src="../assets/logo-color.png" width="86" height="86" alt="" style="object-fit:contain">
    </div>
    <!-- small (navbar) -->
    <div style="width:48px;height:48px;border-radius:50%;background:var(--paper-cream);display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(7,18,29,0.18), 0 4px 12px -4px rgba(0,0,0,0.4)">
      <img src="../assets/logo-color.png" width="42" height="42" alt="" style="object-fit:contain">
    </div>
    <div style="margin-left:auto;max-width:200px">
      <div style="font-family:var(--font-display);font-size:18px;line-height:1.16;margin-bottom:8px">On the ink.</div>
      <div style="font-size:12.5px;color:var(--fg-muted);line-height:1.55">When the page is dark, place the seal inside a cream paper disc. Three sizes shown: 200 / 96 / 48.</div>
    </div>
  </div>
</body></html>
