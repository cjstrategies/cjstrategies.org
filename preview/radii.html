<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="height:180px">
  <div class="lbl" style="margin-bottom:14px">RADII · CIVIC, MOSTLY SQUARED</div>

    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="width:80px;height:80px;background:var(--deep-blue);border:1px solid var(--rule);border-radius:0"></div>
      <div class="lbl">R-0 · 0</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="width:80px;height:80px;background:var(--deep-blue);border:1px solid var(--rule);border-radius:2px"></div>
      <div class="lbl">R-1 · 2</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="width:80px;height:80px;background:var(--deep-blue);border:1px solid var(--rule);border-radius:4px"></div>
      <div class="lbl">R-2 · 4</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="width:80px;height:80px;background:var(--deep-blue);border:1px solid var(--rule);border-radius:8px"></div>
      <div class="lbl">R-3 · 8</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="width:80px;height:80px;background:var(--deep-blue);border:1px solid var(--rule);border-radius:14px"></div>
      <div class="lbl">R-4 · 14</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="width:80px;height:80px;background:var(--deep-blue);border:1px solid var(--rule);border-radius:22px"></div>
      <div class="lbl">R-5 · 22</div>
    </div>
  </div>
</body></html>
